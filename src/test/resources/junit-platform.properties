# JUnit Platform Configuration for Cucumber

# Cucumber filter for feature discovery
cucumber.features=src/test/resources/features

# Glue path (where step definitions and hooks are located)
cucumber.glue=com.cydeo.step_definitions

# Plugin for reporting
cucumber.plugin=html:target/cucumber-reports.html,json:target/cucumber.json,pretty

# Dry run (set too false to execute, true to just validate steps)
cucumber.dryrun=false

